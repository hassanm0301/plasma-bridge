asyncapi: 3.1.0
info:
  title: plasma_bridge WebSocket API
  version: '@PLASMA_BRIDGE_VERSION@'
  description: Live WebSocket monitoring for KDE Plasma audio and window state. The service exposes one implemented WebSocket endpoint at `@PLASMA_BRIDGE_WS_PATH@`.
defaultContentType: application/json
servers:
  local:
    host: '@PLASMA_BRIDGE_DEFAULT_WS_HOSTPORT@'
    protocol: ws
    title: Local WebSocket server
    summary: WebSocket server for live audio and window state.
channels:
  state:
    address: '@PLASMA_BRIDGE_WS_PATH@'
    messages:
      hello:
        $ref: '#/components/messages/Hello'
      fullState:
        $ref: '#/components/messages/FullState'
      patch:
        $ref: '#/components/messages/Patch'
      error:
        $ref: '#/components/messages/Error'
operations:
  receiveHello:
    action: receive
    channel:
      $ref: '#/channels/state'
    title: Receive hello
    summary: Accept the initial client hello message.
    description: The client must send this message before the service streams any state.
    messages:
      - $ref: '#/channels/state/messages/hello'
  sendFullState:
    action: send
    channel:
      $ref: '#/channels/state'
    title: Send full state
    summary: Send the initial audio and window snapshot after a successful hello.
    description: The full state is sent once the configured state stores are ready.
    messages:
      - $ref: '#/channels/state/messages/fullState'
  sendPatch:
    action: send
    channel:
      $ref: '#/channels/state'
    title: Send patch
    summary: Send an audio or window update after observed state changes.
    description: Each patch replaces one top-level subtree, either `audio` or `windowState`. Local HTTP control writes may trigger the same patch stream after the observer republishes state.
    messages:
      - $ref: '#/channels/state/messages/patch'
  sendError:
    action: send
    channel:
      $ref: '#/channels/state'
    title: Send error
    summary: Send a protocol, endpoint, or readiness error to the client.
    description: Invalid JSON, unsupported protocol versions, unknown paths, and unsupported client messages return an `error` message. A `not_ready` error may be sent without closing the socket before the initial state is available.
    messages:
      - $ref: '#/channels/state/messages/error'
components:
  schemas:
    NullValue:
      type: 'null'
    AudioDeviceState:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - volume
        - muted
        - available
        - isDefault
        - isVirtual
        - backendApi
      properties:
        id:
          type: string
        label:
          type: string
        volume:
          type: number
          minimum: 0
        muted:
          type: boolean
        available:
          type: boolean
        isDefault:
          type: boolean
        isVirtual:
          type: boolean
        backendApi:
          type:
            - string
            - 'null'
    AudioState:
      type: object
      additionalProperties: false
      required:
        - sinks
        - selectedSinkId
        - sources
        - selectedSourceId
      properties:
        sinks:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSinkId:
          type:
            - string
            - 'null'
        sources:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSourceId:
          type:
            - string
            - 'null'
    WindowGeometry:
      type: object
      additionalProperties: false
      required:
        - x
        - y
        - width
        - height
      properties:
        x:
          type: integer
        y:
          type: integer
        width:
          type: integer
        height:
          type: integer
    WindowState:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - appId
        - pid
        - isActive
        - isMinimized
        - isMaximized
        - isFullscreen
        - isOnAllDesktops
        - skipTaskbar
        - skipSwitcher
        - geometry
        - clientGeometry
        - virtualDesktopIds
        - activityIds
        - parentId
        - resourceName
        - iconUrl
      properties:
        id:
          type: string
        title:
          type: string
        appId:
          type:
            - string
            - 'null'
        pid:
          type:
            - integer
            - 'null'
        isActive:
          type: boolean
        isMinimized:
          type: boolean
        isMaximized:
          type: boolean
        isFullscreen:
          type: boolean
        isOnAllDesktops:
          type: boolean
        skipTaskbar:
          type: boolean
        skipSwitcher:
          type: boolean
        geometry:
          $ref: '#/components/schemas/WindowGeometry'
        clientGeometry:
          $ref: '#/components/schemas/WindowGeometry'
        virtualDesktopIds:
          type: array
          items:
            type: string
        activityIds:
          type: array
          items:
            type: string
        parentId:
          type:
            - string
            - 'null'
        resourceName:
          type:
            - string
            - 'null'
        iconUrl:
          type:
            - string
            - 'null'
          description: Backend-relative URL for the app icon when one can be resolved.
    WindowSnapshot:
      type: object
      additionalProperties: false
      required:
        - activeWindowId
        - activeWindow
        - windows
      properties:
        activeWindowId:
          type:
            - string
            - 'null'
        activeWindow:
          oneOf:
            - $ref: '#/components/schemas/WindowState'
            - $ref: '#/components/schemas/NullValue'
        windows:
          type: array
          items:
            $ref: '#/components/schemas/WindowState'
    StatePayload:
      type: object
      additionalProperties: false
      required:
        - audio
        - windowState
      properties:
        audio:
          $ref: '#/components/schemas/AudioState'
        windowState:
          $ref: '#/components/schemas/WindowSnapshot'
    AudioPatchChange:
      type: object
      additionalProperties: false
      required:
        - path
        - value
      properties:
        path:
          type: string
          const: audio
        value:
          $ref: '#/components/schemas/AudioState'
    WindowPatchChange:
      type: object
      additionalProperties: false
      required:
        - path
        - value
      properties:
        path:
          type: string
          const: windowState
        value:
          $ref: '#/components/schemas/WindowSnapshot'
    PatchChange:
      oneOf:
        - $ref: '#/components/schemas/AudioPatchChange'
        - $ref: '#/components/schemas/WindowPatchChange'
    HelloData:
      type: object
      additionalProperties: false
      required:
        - protocolVersion
      properties:
        protocolVersion:
          type: integer
          const: '@PLASMA_BRIDGE_WS_PROTOCOL_VERSION@'
    PatchData:
      type: object
      additionalProperties: false
      required:
        - reason
        - sinkId
        - sourceId
        - windowId
        - changes
      properties:
        reason:
          type:
            - string
            - 'null'
        sinkId:
          type:
            - string
            - 'null'
        sourceId:
          type:
            - string
            - 'null'
        windowId:
          type:
            - string
            - 'null'
        changes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PatchChange'
    ErrorObject:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - unknown_endpoint
            - bad_request
            - unsupported_protocol_version
            - protocol_error
            - not_ready
        message:
          type: string
        details:
          type:
            - object
            - 'null'
          additionalProperties: true
    HelloMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: hello
        payload:
          $ref: '#/components/schemas/HelloData'
        error:
          $ref: '#/components/schemas/NullValue'
    FullStateMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: fullState
        payload:
          $ref: '#/components/schemas/StatePayload'
        error:
          $ref: '#/components/schemas/NullValue'
    PatchMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: patch
        payload:
          $ref: '#/components/schemas/PatchData'
        error:
          $ref: '#/components/schemas/NullValue'
    ErrorMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: error
        payload:
          $ref: '#/components/schemas/NullValue'
        error:
          $ref: '#/components/schemas/ErrorObject'
  messages:
    Hello:
      name: hello
      title: Hello
      summary: Initial client hello message.
      payload:
        $ref: '#/components/schemas/HelloMessage'
      examples:
        - payload:
            type: hello
            payload:
              protocolVersion: '@PLASMA_BRIDGE_WS_PROTOCOL_VERSION@'
            error: null
    FullState:
      name: fullState
      title: Full state
      summary: Initial audio and window snapshot sent after a successful hello.
      payload:
        $ref: '#/components/schemas/FullStateMessage'
      examples:
        - payload:
            type: fullState
            payload:
              audio:
                sinks:
                  - id: sink-main
                    label: Primary Speakers
                    volume: 0.75
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
                selectedSinkId: sink-main
                sources:
                  - id: source-main
                    label: Primary Microphone
                    volume: 0.64
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
                selectedSourceId: source-main
              windowState:
                activeWindowId: window-editor
                activeWindow:
                  id: window-editor
                  title: CHANGELOG.md - Kate
                  appId: org.kde.kate
                  pid: 4201
                  isActive: true
                  isMinimized: false
                  isMaximized: true
                  isFullscreen: false
                  isOnAllDesktops: false
                  skipTaskbar: false
                  skipSwitcher: false
                  geometry: { x: 40, y: 30, width: 1440, height: 960 }
                  clientGeometry: { x: 40, y: 58, width: 1440, height: 932 }
                  virtualDesktopIds: [desktop-1]
                  activityIds: [activity-work]
                  parentId: null
                  resourceName: kate
                  iconUrl: /icons/apps/org.kde.kate
                windows: []
            error: null
    Patch:
      name: patch
      title: Patch
      summary: Audio or window change event.
      payload:
        $ref: '#/components/schemas/PatchMessage'
      examples:
        - payload:
            type: patch
            payload:
              reason: sink-updated
              sinkId: sink-main
              sourceId: null
              windowId: null
              changes:
                - path: audio
                  value:
                    sinks:
                      - id: sink-main
                        label: Primary Speakers
                        volume: 0.80
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSinkId: sink-main
                    sources:
                      - id: source-main
                        label: Primary Microphone
                        volume: 0.64
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSourceId: source-main
            error: null
        - payload:
            type: patch
            payload:
              reason: active-window-changed
              sinkId: null
              sourceId: null
              windowId: window-editor
              changes:
                - path: windowState
                  value:
                    activeWindowId: window-editor
                    activeWindow:
                      id: window-editor
                      title: CHANGELOG.md - Kate
                      appId: org.kde.kate
                      pid: 4201
                      isActive: true
                      isMinimized: false
                      isMaximized: true
                      isFullscreen: false
                      isOnAllDesktops: false
                      skipTaskbar: false
                      skipSwitcher: false
                      geometry: { x: 40, y: 30, width: 1440, height: 960 }
                      clientGeometry: { x: 40, y: 58, width: 1440, height: 932 }
                      virtualDesktopIds: [desktop-1]
                      activityIds: [activity-work]
                      parentId: null
                      resourceName: kate
                      iconUrl: /icons/apps/org.kde.kate
                    windows: []
            error: null
    Error:
      name: error
      title: Error
      summary: Error message emitted by the service.
      payload:
        $ref: '#/components/schemas/ErrorMessage'
      examples:
        - payload:
            type: error
            payload: null
            error:
              code: not_ready
              message: Initial audio and window state are not ready yet.
