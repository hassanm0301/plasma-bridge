components:
  parameters:
    SinkId:
      name: sinkId
      in: path
      required: true
      description: URL-decoded sink identifier. Encoded slashes are not supported.
      example: sink-main
      schema:
        type: string
    SourceId:
      name: sourceId
      in: path
      required: true
      description: URL-decoded source identifier. Encoded slashes are not supported.
      example: source-main
      schema:
        type: string
    WindowId:
      name: windowId
      in: path
      required: true
      description: URL-decoded Plasma window identifier from the window snapshot. Encoded slashes are not supported.
      example: window-editor
      schema:
        type: string
  schemas:
    NullValue:
      type: 'null'
    AudioDeviceState:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - volume
        - muted
        - available
        - isDefault
        - isVirtual
        - backendApi
      properties:
        id:
          type: string
          description: Canonical device identifier.
        label:
          type: string
          description: Human-readable device name.
        volume:
          type: number
          description: Normalized device volume.
          minimum: 0
        muted:
          type: boolean
        available:
          type: boolean
        isDefault:
          type: boolean
        isVirtual:
          type: boolean
        backendApi:
          type:
            - string
            - 'null'
          description: Backend API reported by the device, such as `alsa`.
    AudioOutputState:
      type: object
      additionalProperties: false
      required:
        - sinks
        - selectedSinkId
      properties:
        sinks:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSinkId:
          type:
            - string
            - 'null'
          description: Identifier of the current default output sink.
    AudioInputState:
      type: object
      additionalProperties: false
      required:
        - sources
        - selectedSourceId
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSourceId:
          type:
            - string
            - 'null'
          description: Identifier of the current default input source.
    MediaPlayerState:
      type: object
      additionalProperties: false
      required:
        - playerId
        - identity
        - desktopEntry
        - playbackStatus
        - title
        - artists
        - album
        - trackLengthMs
        - positionMs
        - canPlay
        - canPause
        - canGoNext
        - canGoPrevious
        - canControl
        - canSeek
        - appIconUrl
        - artworkUrl
      properties:
        playerId:
          type: string
        identity:
          type:
            - string
            - 'null'
        desktopEntry:
          type:
            - string
            - 'null'
        playbackStatus:
          type: string
          enum: [unknown, playing, paused, stopped]
        title:
          type:
            - string
            - 'null'
        artists:
          type: array
          items:
            type: string
        album:
          type:
            - string
            - 'null'
        trackLengthMs:
          type:
            - integer
            - 'null'
        positionMs:
          type:
            - integer
            - 'null'
        canPlay:
          type: boolean
        canPause:
          type: boolean
        canGoNext:
          type: boolean
        canGoPrevious:
          type: boolean
        canControl:
          type: boolean
        canSeek:
          type: boolean
        appIconUrl:
          type:
            - string
            - 'null'
        artworkUrl:
          type:
            - string
            - 'null'
    MediaState:
      type: object
      additionalProperties: false
      required:
        - player
      properties:
        player:
          oneOf:
            - $ref: '#/components/schemas/MediaPlayerState'
            - $ref: '#/components/schemas/NullValue'
    WindowGeometry:
      type: object
      additionalProperties: false
      required:
        - x
        - y
        - width
        - height
      properties:
        x:
          type: integer
        y:
          type: integer
        width:
          type: integer
        height:
          type: integer
    WindowState:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - appId
        - pid
        - isActive
        - isMinimized
        - isMaximized
        - isFullscreen
        - isOnAllDesktops
        - skipTaskbar
        - skipSwitcher
        - geometry
        - clientGeometry
        - virtualDesktopIds
        - activityIds
        - parentId
        - resourceName
        - iconUrl
      properties:
        id:
          type: string
        title:
          type: string
        appId:
          type:
            - string
            - 'null'
        pid:
          type:
            - integer
            - 'null'
        isActive:
          type: boolean
        isMinimized:
          type: boolean
        isMaximized:
          type: boolean
        isFullscreen:
          type: boolean
        isOnAllDesktops:
          type: boolean
        skipTaskbar:
          type: boolean
        skipSwitcher:
          type: boolean
        geometry:
          $ref: '#/components/schemas/WindowGeometry'
        clientGeometry:
          $ref: '#/components/schemas/WindowGeometry'
        virtualDesktopIds:
          type: array
          items:
            type: string
        activityIds:
          type: array
          items:
            type: string
        parentId:
          type:
            - string
            - 'null'
        resourceName:
          type:
            - string
            - 'null'
        iconUrl:
          type:
            - string
            - 'null'
          description: Backend-relative URL for the app icon when one can be resolved.
    WindowSnapshot:
      type: object
      additionalProperties: false
      required:
        - activeWindowId
        - activeWindow
        - windows
      properties:
        activeWindowId:
          type:
            - string
            - 'null'
        activeWindow:
          oneOf:
            - $ref: '#/components/schemas/WindowState'
            - $ref: '#/components/schemas/NullValue'
        windows:
          type: array
          items:
            $ref: '#/components/schemas/WindowState'
    ActiveWindowPayload:
      type: object
      additionalProperties: false
      required:
        - window
      properties:
        window:
          oneOf:
            - $ref: '#/components/schemas/WindowState'
            - $ref: '#/components/schemas/NullValue'
    MediaControlPayload:
      type: object
      additionalProperties: false
      required:
        - action
        - playerId
        - positionMs
      properties:
        action:
          type: string
          enum: [play, pause, play_pause, next, previous, seek]
        playerId:
          type:
            - string
            - 'null'
        positionMs:
          type:
            - integer
            - 'null'
    MediaSeekRequest:
      type: object
      additionalProperties: false
      required:
        - positionMs
      properties:
        positionMs:
          type: integer
          minimum: 0
          description: Absolute playback position in milliseconds.
    VolumeValueRequest:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: number
          description: Normalized volume value. For `/volume` requests this is the target level. For `/volume/increment` and `/volume/decrement` requests this is the requested delta.
    MuteValueRequest:
      type: object
      additionalProperties: false
      required:
        - muted
      properties:
        muted:
          type: boolean
          description: Target mute state to apply.
    DefaultDevicePayload:
      type: object
      additionalProperties: false
      required:
        - deviceId
      properties:
        deviceId:
          type: string
    MuteChangePayload:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - requestedMuted
        - targetMuted
        - previousMuted
      properties:
        deviceId:
          type: string
        requestedMuted:
          type:
            - boolean
            - 'null'
        targetMuted:
          type:
            - boolean
            - 'null'
        previousMuted:
          type:
            - boolean
            - 'null'
    VolumeChangePayload:
      type: object
      additionalProperties: false
      required:
        - sinkId
        - requestedValue
        - targetValue
        - previousValue
      properties:
        sinkId:
          type: string
        requestedValue:
          type:
            - number
            - 'null'
        targetValue:
          type:
            - number
            - 'null'
        previousValue:
          type:
            - number
            - 'null'
    WindowActivationPayload:
      type: object
      additionalProperties: false
      required:
        - windowId
      properties:
        windowId:
          type: string
    ErrorObject:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: Optional structured context for endpoint-specific failures.
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/NullValue'
        error:
          $ref: '#/components/schemas/ErrorObject'
    AudioOutputEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/AudioOutputState'
        error:
          $ref: '#/components/schemas/NullValue'
    AudioInputEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/AudioInputState'
        error:
          $ref: '#/components/schemas/NullValue'
    MediaStateEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/MediaState'
        error:
          $ref: '#/components/schemas/NullValue'
    WindowSnapshotEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/WindowSnapshot'
        error:
          $ref: '#/components/schemas/NullValue'
    ActiveWindowEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/ActiveWindowPayload'
        error:
          $ref: '#/components/schemas/NullValue'
    AudioDeviceEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/AudioDeviceState'
        error:
          $ref: '#/components/schemas/NullValue'
    DefaultDeviceEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/DefaultDevicePayload'
        error:
          $ref: '#/components/schemas/NullValue'
    MuteChangeEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/MuteChangePayload'
        error:
          $ref: '#/components/schemas/NullValue'
    VolumeChangeEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/VolumeChangePayload'
        error:
          $ref: '#/components/schemas/NullValue'
    MediaControlEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/MediaControlPayload'
        error:
          $ref: '#/components/schemas/NullValue'
    WindowActivationEnvelope:
      type: object
      additionalProperties: false
      required:
        - payload
        - error
      properties:
        payload:
          $ref: '#/components/schemas/WindowActivationPayload'
        error:
          $ref: '#/components/schemas/NullValue'
