openapi: 3.2.0
info:
  title: plasma_bridge HTTP API
  version: '@PLASMA_BRIDGE_VERSION@'
  summary: Audio, media, and window snapshot endpoints plus local audio, media, and window control endpoints for KDE Plasma.
servers:
  - url: '@PLASMA_BRIDGE_DEFAULT_HTTP_SERVER_URL@'
tags:
  - name: Snapshots / Sinks
    description: Read the current output-device snapshot and default sink.
  - name: Snapshots / Sources
    description: Read the current input-device snapshot and default source.
  - name: Snapshots / Media
    description: Read the current selected media session.
  - name: Snapshots / Windows
    description: Read the current window snapshot and active window.
  - name: Control / Defaults
    description: Change the current default sink or source.
  - name: Control / Mute
    description: Change the mute state for a sink or source.
  - name: Control / Sink Volume
    description: Set or adjust normalized sink volume values.
  - name: Control / Media
    description: Control the currently selected MPRIS media session.
  - name: Control / Windows
    description: Activate existing Plasma windows.
paths:
  /snapshot/audio/sinks:
    get:
      tags:
        - Snapshots / Sinks
      operationId: getAudioSinksSnapshot
      summary: List audio sinks
      description: Returns the current output-device snapshot, including all KDE-visible output sinks and the selected default sink id.
      responses:
        '200':
          description: Current audio sink snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioOutputEnvelope'
              examples:
                snapshot:
                  value:
                    payload:
                      sinks:
                        - id: sink-main
                          label: Primary Speakers
                          volume: 0.75
                          muted: false
                          available: true
                          isDefault: true
                          isVirtual: false
                          backendApi: alsa
                      selectedSinkId: sink-main
                    error: null
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                methodNotAllowed:
                  value:
                    payload: null
                    error:
                      code: method_not_allowed
                      message: Only GET is supported for this endpoint.
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                notReady:
                  value:
                    payload: null
                    error:
                      code: not_ready
                      message: Initial audio state is not ready yet.
  /snapshot/audio/default-sink:
    get:
      tags:
        - Snapshots / Sinks
      operationId: getDefaultAudioSink
      summary: Get the default audio sink
      description: Returns the current default output sink object.
      responses:
        '200':
          description: Current default sink.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioDeviceEnvelope'
              examples:
                defaultSink:
                  value:
                    payload:
                      id: sink-main
                      label: Primary Speakers
                      volume: 0.75
                      muted: false
                      available: true
                      isDefault: true
                      isVirtual: false
                      backendApi: alsa
                    error: null
        '404':
          description: No default sink is currently available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                notFound:
                  value:
                    payload: null
                    error:
                      code: not_found
                      message: No default audio sink available.
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /snapshot/audio/sources:
    get:
      tags:
        - Snapshots / Sources
      operationId: getAudioSourcesSnapshot
      summary: List audio sources
      description: Returns the current input-device snapshot, including KDE-visible capture sources and the selected default source id.
      responses:
        '200':
          description: Current audio source snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioInputEnvelope'
              examples:
                snapshot:
                  value:
                    payload:
                      sources:
                        - id: source-main
                          label: Primary Microphone
                          volume: 0.64
                          muted: false
                          available: true
                          isDefault: true
                          isVirtual: false
                          backendApi: alsa
                      selectedSourceId: source-main
                    error: null
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /snapshot/audio/default-source:
    get:
      tags:
        - Snapshots / Sources
      operationId: getDefaultAudioSource
      summary: Get the default audio source
      description: Returns the current default input source object.
      responses:
        '200':
          description: Current default source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioDeviceEnvelope'
              examples:
                defaultSource:
                  value:
                    payload:
                      id: source-main
                      label: Primary Microphone
                      volume: 0.64
                      muted: false
                      available: true
                      isDefault: true
                      isVirtual: false
                      backendApi: alsa
                    error: null
        '404':
          description: No default source is currently available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                notFound:
                  value:
                    payload: null
                    error:
                      code: not_found
                      message: No default audio source available.
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /snapshot/media/current:
    get:
      tags:
        - Snapshots / Media
      operationId: getCurrentMediaSession
      summary: Get the current media session
      description: Returns the selected current MPRIS media session, or `player: null` when no session is currently selected.
      responses:
        '200':
          description: Current media session result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaStateEnvelope'
              examples:
                current:
                  value:
                    payload:
                      player:
                        playerId: org.mpris.MediaPlayer2.spotify
                        identity: Spotify
                        desktopEntry: spotify
                        playbackStatus: playing
                        title: Song A
                        artists: [Artist One, Artist Two]
                        album: Album A
                        trackLengthMs: 182000
                        positionMs: 64000
                        canPlay: true
                        canPause: true
                        canGoNext: true
                        canGoPrevious: true
                        canControl: true
                        canSeek: true
                        appIconUrl: /icons/apps/spotify
                        artworkUrl: https://cdn.example.test/artwork/song-a.jpg
                    error: null
                noPlayer:
                  value:
                    payload:
                      player: null
                    error: null
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Initial media state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /snapshot/windows:
    get:
      tags:
        - Snapshots / Windows
      operationId: getWindowSnapshot
      summary: List windows
      description: Returns the current Plasma window snapshot, including the resolved active window.
      responses:
        '200':
          description: Current window snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowSnapshotEnvelope'
              examples:
                snapshot:
                  value:
                    payload:
                      activeWindowId: window-editor
                      activeWindow:
                        id: window-editor
                        title: CHANGELOG.md - Kate
                        appId: org.kde.kate
                        pid: 4201
                        isActive: true
                        isMinimized: false
                        isMaximized: true
                        isFullscreen: false
                        isOnAllDesktops: false
                        skipTaskbar: false
                        skipSwitcher: false
                        geometry: { x: 40, y: 30, width: 1440, height: 960 }
                        clientGeometry: { x: 40, y: 58, width: 1440, height: 932 }
                        virtualDesktopIds: [desktop-1]
                        activityIds: [activity-work]
                        parentId: null
                        resourceName: kate
                        iconUrl: /icons/apps/org.kde.kate
                      windows: []
                    error: null
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Initial window state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /snapshot/windows/active:
    get:
      tags:
        - Snapshots / Windows
      operationId: getActiveWindow
      summary: Get the active window
      description: >
        Returns the current active window, or `window: null` when no active window is known.
      responses:
        '200':
          description: Current active window result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveWindowEnvelope'
              examples:
                active:
                  value:
                    payload:
                      window:
                        id: window-editor
                        title: CHANGELOG.md - Kate
                        appId: org.kde.kate
                        pid: 4201
                        isActive: true
                        isMinimized: false
                        isMaximized: true
                        isFullscreen: false
                        isOnAllDesktops: false
                        skipTaskbar: false
                        skipSwitcher: false
                        geometry: { x: 40, y: 30, width: 1440, height: 960 }
                        clientGeometry: { x: 40, y: 58, width: 1440, height: 932 }
                        virtualDesktopIds: [desktop-1]
                        activityIds: [activity-work]
                        parentId: null
                        resourceName: kate
                        iconUrl: /icons/apps/org.kde.kate
                    error: null
                none:
                  value:
                    payload:
                      window: null
                    error: null
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Initial window state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /icons/apps/{iconName}:
    get:
      tags:
        - Assets
      operationId: getAppIcon
      summary: Get an app icon
      description: Resolves an app icon name against the local Plasma icon theme.
      parameters:
        - name: iconName
          in: path
          required: true
          schema:
            type: string
          example: org.kde.kate
      responses:
        '200':
          description: Icon bytes.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary
        '404':
          description: Icon not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/windows/{windowId}/active:
    post:
      tags:
        - Control / Windows
      operationId: activateWindow
      summary: Activate a window
      description: >
        Requests that KWin bring the target Plasma window into view and focus it. The response confirms
        that the request was accepted; the resulting active-window state is published later through the
        normal snapshot and WebSocket state flow.
      parameters:
        - $ref: '#/components/parameters/WindowId'
      responses:
        '200':
          description: Window activation request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowActivationEnvelope'
              examples:
                accepted:
                  value:
                    payload:
                      windowId: window-editor
                    error: null
        '400':
          description: Unexpected request body, invalid window id path segment, or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Requested window was not found in the current window snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                windowNotFound:
                  value:
                    payload: null
                    error:
                      code: window_not_found
                      message: Requested window was not found.
                      details:
                        windowId: window-editor
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Window exists but cannot be activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                notActivatable:
                  value:
                    payload: null
                    error:
                      code: window_not_activatable
                      message: Window exists but cannot be activated.
                      details:
                        windowId: window-editor
        '503':
          description: Initial window state or window activation control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/media/current/play:
    post:
      tags:
        - Control / Media
      operationId: playCurrentMedia
      summary: Play the current media session
      description: Requests `Play` on the selected current MPRIS media session.
      responses:
        '200':
          description: Media control request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaControlEnvelope'
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No current media player is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Current media player does not support this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Media control is not ready yet or the current player is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/media/current/pause:
    post:
      tags:
        - Control / Media
      operationId: pauseCurrentMedia
      summary: Pause the current media session
      description: Requests `Pause` on the selected current MPRIS media session.
      responses:
        '200':
          description: Media control request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaControlEnvelope'
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No current media player is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Current media player does not support this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Media control is not ready yet or the current player is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/media/current/play-pause:
    post:
      tags:
        - Control / Media
      operationId: playPauseCurrentMedia
      summary: Toggle play/pause on the current media session
      description: Requests `PlayPause` on the selected current MPRIS media session.
      responses:
        '200':
          description: Media control request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaControlEnvelope'
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No current media player is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Current media player does not support this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Media control is not ready yet or the current player is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/media/current/next:
    post:
      tags:
        - Control / Media
      operationId: nextCurrentMediaTrack
      summary: Skip to the next track on the current media session
      description: Requests `Next` on the selected current MPRIS media session.
      responses:
        '200':
          description: Media control request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaControlEnvelope'
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No current media player is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Current media player does not support this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Media control is not ready yet or the current player is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/media/current/previous:
    post:
      tags:
        - Control / Media
      operationId: previousCurrentMediaTrack
      summary: Return to the previous track on the current media session
      description: Requests `Previous` on the selected current MPRIS media session.
      responses:
        '200':
          description: Media control request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaControlEnvelope'
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No current media player is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Current media player does not support this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Media control is not ready yet or the current player is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/media/current/seek:
    post:
      tags:
        - Control / Media
      operationId: seekCurrentMedia
      summary: Seek within the current media session
      description: Requests `SetPosition` on the selected current MPRIS media session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaSeekRequest'
      responses:
        '200':
          description: Media seek request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaControlEnvelope'
        '400':
          description: Invalid seek request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No current media player is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Current media player does not support seeking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '415':
          description: Content type must be JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Media control is not ready yet or the current player is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/audio/sinks/{sinkId}/default:
    post:
      tags:
        - Control / Defaults
      operationId: setDefaultAudioSink
      summary: Set the default audio sink
      description: Sets the current default output sink.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      responses:
        '200':
          description: Default sink change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceEnvelope'
              examples:
                accepted:
                  value:
                    payload:
                      deviceId: sink-main
                    error: null
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                sinkNotFound:
                  value:
                    payload: null
                    error:
                      code: sink_not_found
                      message: Requested sink was not found.
                      details:
                        deviceId: sink-main
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Sink exists but cannot be selected as default.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Audio device control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /control/audio/sources/{sourceId}/default:
    post:
      tags:
        - Control / Defaults
      operationId: setDefaultAudioSource
      summary: Set the default audio source
      description: Sets the current default input source.
      parameters:
        - $ref: '#/components/parameters/SourceId'
      responses:
        '200':
          description: Default source change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceEnvelope'
              examples:
                accepted:
                  value:
                    payload:
                      deviceId: source-main
                    error: null
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Requested source was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
