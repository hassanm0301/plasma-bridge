  /control/audio/sinks/{sinkId}/volume:
    post:
      tags:
        - Control / Sink Volume
      operationId: setAudioSinkVolume
      summary: Set sink volume
      description: Sets the target normalized sink volume. The controller preserves current behavior by clamping the applied target to the `[0.0, 1.0]` range.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeValueRequest'
            examples:
              setVolume:
                value:
                  value: 0.55
      responses:
        '200':
          description: Volume change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeEnvelope'
              examples:
                accepted:
                  value:
                    payload:
                      sinkId: sink-main
                      requestedValue: 0.55
                      targetValue: 0.55
                      previousValue: 0.75
                    error: null
        '400':
          description: Invalid controller value response, malformed JSON body, missing `value`, or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalidValue:
                  value:
                    payload: null
                    error:
                      code: invalid_value
                      message: Requested volume value is invalid.
                      details:
                        sinkId: sink-main
                        requestedValue: 2.0
                        targetValue: null
                        previousValue: 0.75
                badRequest:
                  value:
                    payload: null
                    error:
                      code: bad_request
                      message: Request body must contain a numeric value field.
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
