<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>plasma_bridge HTTP API</title>
  <link rel="stylesheet" href="/docs/assets/swagger-ui/swagger-ui.css">
  <style>
    body {
      margin: 0;
      background: #f8fafc;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #0f172a;
      color: #f8fafc;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .topbar a {
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>plasma_bridge HTTP API</div>
    <a href="/docs/">All docs</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="/docs/assets/swagger-ui/swagger-ui-bundle.js"></script>
  <script src="/docs/assets/swagger-ui/swagger-ui-standalone-preset.js"></script>
  <script>
    const tagOrder = [
      "Snapshots / Sinks",
      "Snapshots / Sources",
      "Control / Defaults",
      "Control / Mute",
      "Control / Sink Volume"
    ];

    function getTagName(tag) {
      if (typeof tag === "string") {
        return tag;
      }
      if (tag && typeof tag.get === "function") {
        return tag.get("name") || String(tag);
      }
      return String(tag);
    }

    window.ui = SwaggerUIBundle({
      url: "/docs/openapi.yaml",
      dom_id: "#swagger-ui",
      deepLinking: true,
      docExpansion: "list",
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset
      ],
      tagsSorter: (left, right) => {
        const leftName = getTagName(left);
        const rightName = getTagName(right);
        const leftIndex = tagOrder.indexOf(leftName);
        const rightIndex = tagOrder.indexOf(rightName);
        const normalizedLeftIndex = leftIndex === -1 ? Number.MAX_SAFE_INTEGER : leftIndex;
        const normalizedRightIndex = rightIndex === -1 ? Number.MAX_SAFE_INTEGER : rightIndex;

        return normalizedLeftIndex - normalizedRightIndex || leftName.localeCompare(rightName);
      },
      layout: "StandaloneLayout"
    });
  </script>
</body>
</html>
