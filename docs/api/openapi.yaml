openapi: 3.2.0
info:
  title: plasma_bridge HTTP API
  version: 0.1.0
  summary: Audio snapshot and volume-control endpoints for KDE Plasma output sinks.
servers:
  - url: http://127.0.0.1:8080
paths:
  /snapshot/audio/sinks:
    get:
      operationId: getAudioSinksSnapshot
      summary: List audio sinks
      description: Returns the current audio snapshot, including all KDE-visible output sinks and the current default sink id.
      responses:
        '200':
          description: Current audio sink snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioState'
              examples:
                snapshot:
                  value:
                    sinks:
                      - id: alsa_output.usb-example.analog-stereo
                        label: USB Audio
                        volume: 0.75
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSinkId: alsa_output.usb-example.analog-stereo
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                methodNotAllowed:
                  value:
                    ok: false
                    code: method_not_allowed
                    message: Only GET is supported for this endpoint.
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notReady:
                  value:
                    ok: false
                    code: not_ready
                    message: Initial audio sink state is not ready yet.
  /snapshot/audio/default-sink:
    get:
      operationId: getDefaultAudioSink
      summary: Get the default audio sink
      description: Returns the current default output sink object.
      responses:
        '200':
          description: Current default sink.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioSinkState'
              examples:
                defaultSink:
                  value:
                    id: alsa_output.usb-example.analog-stereo
                    label: USB Audio
                    volume: 0.75
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
        '404':
          description: No default sink is currently available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    code: not_found
                    message: No default audio sink available.
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                methodNotAllowed:
                  value:
                    ok: false
                    code: method_not_allowed
                    message: Only GET is supported for this endpoint.
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notReady:
                  value:
                    ok: false
                    code: not_ready
                    message: Initial audio sink state is not ready yet.
  /control/audio/sinks/{sinkId}/volume:
    post:
      operationId: setAudioSinkVolume
      summary: Set sink volume
      description: >
        Sets the target normalized sink volume. The controller preserves current behavior by clamping the applied target to the `[0.0, 1.0]` range.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeValueRequest'
            examples:
              setVolume:
                value:
                  value: 0.55
      responses:
        '200':
          description: Volume change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
              examples:
                accepted:
                  value:
                    status: accepted
                    sinkId: alsa_output.usb-example.analog-stereo
                    requestedValue: 0.55
                    targetValue: 0.55
                    previousValue: 0.41
        '400':
          description: Invalid controller value response, malformed JSON body, missing `value`, or other bad request error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/VolumeChangeResult'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidValue:
                  value:
                    status: invalid_value
                    sinkId: alsa_output.usb-example.analog-stereo
                    requestedValue: 2.0
                    targetValue: null
                    previousValue: 0.75
                badRequest:
                  value:
                    ok: false
                    code: bad_request
                    message: Request body must contain a numeric value field.
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
              examples:
                sinkNotFound:
                  value:
                    status: sink_not_found
                    sinkId: missing-sink
                    requestedValue: 0.55
                    targetValue: null
                    previousValue: null
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                methodNotAllowed:
                  value:
                    ok: false
                    code: method_not_allowed
                    message: Only POST is supported for this endpoint.
        '409':
          description: Sink exists but cannot be written to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
              examples:
                sinkNotWritable:
                  value:
                    status: sink_not_writable
                    sinkId: bluez_output.headset.1
                    requestedValue: 0.55
                    targetValue: null
                    previousValue: 0.35
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unsupportedMediaType:
                  value:
                    ok: false
                    code: unsupported_media_type
                    message: Content-Type must be application/json.
        '503':
          description: Volume control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
              examples:
                notReady:
                  value:
                    status: not_ready
                    sinkId: alsa_output.usb-example.analog-stereo
                    requestedValue: 0.55
                    targetValue: null
                    previousValue: 0.75
  /control/audio/sinks/{sinkId}/volume/increment:
    post:
      operationId: incrementAudioSinkVolume
      summary: Increment sink volume
      description: >
        Increases the normalized sink volume by a non-negative delta. The controller preserves current behavior by clamping the resulting target to the `[0.0, 1.0]` range.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeValueRequest'
            examples:
              incrementVolume:
                value:
                  value: 0.1
      responses:
        '200':
          description: Volume increment request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
              examples:
                accepted:
                  value:
                    status: accepted
                    sinkId: alsa_output.usb-example.analog-stereo
                    requestedValue: 0.1
                    targetValue: 0.85
                    previousValue: 0.75
        '400':
          description: Invalid controller value response, malformed JSON body, missing `value`, or other bad request error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/VolumeChangeResult'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidValue:
                  value:
                    status: invalid_value
                    sinkId: alsa_output.usb-example.analog-stereo
                    requestedValue: -0.1
                    targetValue: null
                    previousValue: 0.75
                badRequest:
                  value:
                    ok: false
                    code: bad_request
                    message: Request body must be valid JSON.
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sink exists but cannot be written to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Volume control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
  /control/audio/sinks/{sinkId}/volume/decrement:
    post:
      operationId: decrementAudioSinkVolume
      summary: Decrement sink volume
      description: >
        Decreases the normalized sink volume by a non-negative delta. The controller preserves current behavior by clamping the resulting target to the `[0.0, 1.0]` range.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeValueRequest'
            examples:
              decrementVolume:
                value:
                  value: 0.15
      responses:
        '200':
          description: Volume decrement request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
              examples:
                accepted:
                  value:
                    status: accepted
                    sinkId: bluez_output.headset.1
                    requestedValue: 0.15
                    targetValue: 0.2
                    previousValue: 0.35
        '400':
          description: Invalid controller value response, malformed JSON body, missing `value`, or other bad request error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/VolumeChangeResult'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidValue:
                  value:
                    status: invalid_value
                    sinkId: bluez_output.headset.1
                    requestedValue: -0.15
                    targetValue: null
                    previousValue: 0.35
                badRequest:
                  value:
                    ok: false
                    code: bad_request
                    message: Request body is required.
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sink exists but cannot be written to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Volume control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
components:
  parameters:
    SinkId:
      name: sinkId
      in: path
      required: true
      description: URL-decoded sink identifier. Encoded slashes are not supported.
      schema:
        type: string
  schemas:
    AudioSinkState:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - volume
        - muted
        - available
        - isDefault
        - isVirtual
        - backendApi
      properties:
        id:
          type: string
          description: Canonical sink identifier.
        label:
          type: string
          description: Human-readable sink name.
        volume:
          type: number
          description: Normalized sink volume.
          minimum: 0
        muted:
          type: boolean
        available:
          type: boolean
        isDefault:
          type: boolean
        isVirtual:
          type: boolean
        backendApi:
          type:
            - string
            - 'null'
          description: Backend API reported by the sink, such as `alsa`.
    AudioState:
      type: object
      additionalProperties: false
      required:
        - sinks
        - selectedSinkId
      properties:
        sinks:
          type: array
          items:
            $ref: '#/components/schemas/AudioSinkState'
        selectedSinkId:
          type:
            - string
            - 'null'
          description: Identifier of the current default output sink.
    VolumeValueRequest:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: number
          description: >
            Normalized volume value. For `/volume` requests this is the target level.
            For `/volume/increment` and `/volume/decrement` requests this is the requested delta.
    VolumeChangeResult:
      type: object
      additionalProperties: false
      required:
        - status
        - sinkId
        - requestedValue
        - targetValue
        - previousValue
      properties:
        status:
          type: string
          enum:
            - accepted
            - not_ready
            - sink_not_found
            - sink_not_writable
            - invalid_value
        sinkId:
          type: string
        requestedValue:
          type:
            - number
            - 'null'
        targetValue:
          type:
            - number
            - 'null'
        previousValue:
          type:
            - number
            - 'null'
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - code
        - message
      properties:
        ok:
          type: boolean
          const: false
        code:
          type: string
        message:
          type: string
