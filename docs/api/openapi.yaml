openapi: 3.2.0
info:
  title: plasma_bridge HTTP API
  version: '@PLASMA_BRIDGE_VERSION@'
  summary: Audio snapshot endpoints plus local sink/source control endpoints for KDE Plasma.
servers:
  - url: '@PLASMA_BRIDGE_DEFAULT_HTTP_SERVER_URL@'
paths:
  /snapshot/audio/sinks:
    get:
      operationId: getAudioSinksSnapshot
      summary: List audio sinks
      description: Returns the current output-device snapshot, including all KDE-visible output sinks and the selected default sink id.
      responses:
        '200':
          description: Current audio sink snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioOutputState'
              examples:
                snapshot:
                  value:
                    sinks:
                      - id: alsa_output.usb-example.analog-stereo
                        label: USB Audio
                        volume: 0.75
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSinkId: alsa_output.usb-example.analog-stereo
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                methodNotAllowed:
                  value:
                    ok: false
                    code: method_not_allowed
                    message: Only GET is supported for this endpoint.
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notReady:
                  value:
                    ok: false
                    code: not_ready
                    message: Initial audio state is not ready yet.
  /snapshot/audio/default-sink:
    get:
      operationId: getDefaultAudioSink
      summary: Get the default audio sink
      description: Returns the current default output sink object.
      responses:
        '200':
          description: Current default sink.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioDeviceState'
              examples:
                defaultSink:
                  value:
                    id: alsa_output.usb-example.analog-stereo
                    label: USB Audio
                    volume: 0.75
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
        '404':
          description: No default sink is currently available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    code: not_found
                    message: No default audio sink available.
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /snapshot/audio/sources:
    get:
      operationId: getAudioSourcesSnapshot
      summary: List audio sources
      description: Returns the current input-device snapshot, including KDE-visible capture sources and the selected default source id.
      responses:
        '200':
          description: Current audio source snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioInputState'
              examples:
                snapshot:
                  value:
                    sources:
                      - id: alsa_input.usb-example.analog-stereo
                        label: USB Microphone
                        volume: 0.64
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSourceId: alsa_input.usb-example.analog-stereo
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /snapshot/audio/default-source:
    get:
      operationId: getDefaultAudioSource
      summary: Get the default audio source
      description: Returns the current default input source object.
      responses:
        '200':
          description: Current default source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioDeviceState'
              examples:
                defaultSource:
                  value:
                    id: alsa_input.usb-example.analog-stereo
                    label: USB Microphone
                    volume: 0.64
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
        '404':
          description: No default source is currently available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    ok: false
                    code: not_found
                    message: No default audio source available.
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Initial audio state is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /control/audio/sinks/{sinkId}/default:
    post:
      operationId: setDefaultAudioSink
      summary: Set the default audio sink
      description: Sets the current default output sink.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      responses:
        '200':
          description: Default sink change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sink exists but cannot be selected as default.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
        '503':
          description: Audio device control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
  /control/audio/sources/{sourceId}/default:
    post:
      operationId: setDefaultAudioSource
      summary: Set the default audio source
      description: Sets the current default input source.
      parameters:
        - $ref: '#/components/parameters/SourceId'
      responses:
        '200':
          description: Default source change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
        '400':
          description: Unexpected request body or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested source was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Source exists but cannot be selected as default.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
        '503':
          description: Audio device control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultDeviceChangeResult'
  /control/audio/sinks/{sinkId}/mute:
    post:
      operationId: setAudioSinkMuted
      summary: Set sink mute state
      description: Sets the mute state for the requested output sink.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuteValueRequest'
            examples:
              muteSink:
                value:
                  muted: true
      responses:
        '200':
          description: Sink mute change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
        '400':
          description: Malformed JSON body, missing `muted`, or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sink exists but cannot be muted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Audio device control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
  /control/audio/sources/{sourceId}/mute:
    post:
      operationId: setAudioSourceMuted
      summary: Set source mute state
      description: Sets the mute state for the requested input source.
      parameters:
        - $ref: '#/components/parameters/SourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuteValueRequest'
            examples:
              muteSource:
                value:
                  muted: false
      responses:
        '200':
          description: Source mute change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
        '400':
          description: Malformed JSON body, missing `muted`, or other bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested source was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Source exists but cannot be muted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Audio device control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteChangeResult'
  /control/audio/sinks/{sinkId}/volume:
    post:
      operationId: setAudioSinkVolume
      summary: Set sink volume
      description: Sets the target normalized sink volume. The controller preserves current behavior by clamping the applied target to the `[0.0, 1.0]` range.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeValueRequest'
            examples:
              setVolume:
                value:
                  value: 0.55
      responses:
        '200':
          description: Volume change request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '400':
          description: Invalid controller value response, malformed JSON body, missing `value`, or other bad request error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/VolumeChangeResult'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidValue:
                  value:
                    status: invalid_value
                    sinkId: alsa_output.usb-example.analog-stereo
                    requestedValue: 2.0
                    targetValue: null
                    previousValue: 0.75
                badRequest:
                  value:
                    ok: false
                    code: bad_request
                    message: Request body must contain a numeric value field.
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sink exists but cannot be written to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Volume control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
  /control/audio/sinks/{sinkId}/volume/increment:
    post:
      operationId: incrementAudioSinkVolume
      summary: Increment sink volume
      description: Increases the normalized sink volume by a non-negative delta. The controller preserves current behavior by clamping the resulting target to the `[0.0, 1.0]` range.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeValueRequest'
            examples:
              incrementVolume:
                value:
                  value: 0.10
      responses:
        '200':
          description: Volume increment request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '400':
          description: Invalid controller value response, malformed JSON body, missing `value`, or other bad request error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/VolumeChangeResult'
                  - $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sink exists but cannot be written to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Volume control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
  /control/audio/sinks/{sinkId}/volume/decrement:
    post:
      operationId: decrementAudioSinkVolume
      summary: Decrement sink volume
      description: Decreases the normalized sink volume by a non-negative delta. The controller preserves current behavior by clamping the resulting target to the `[0.0, 1.0]` range.
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VolumeValueRequest'
            examples:
              decrementVolume:
                value:
                  value: 0.15
      responses:
        '200':
          description: Volume decrement request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '400':
          description: Invalid controller value response, malformed JSON body, missing `value`, or other bad request error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/VolumeChangeResult'
                  - $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested sink was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '405':
          description: Method not allowed.
          headers:
            Allow:
              description: Allowed HTTP methods for this endpoint.
              schema:
                type: string
              example: POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sink exists but cannot be written to.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
        '415':
          description: Request body content type is not supported for control endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Volume control is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeChangeResult'
components:
  parameters:
    SinkId:
      name: sinkId
      in: path
      required: true
      description: URL-decoded sink identifier. Encoded slashes are not supported.
      schema:
        type: string
    SourceId:
      name: sourceId
      in: path
      required: true
      description: URL-decoded source identifier. Encoded slashes are not supported.
      schema:
        type: string
  schemas:
    AudioDeviceState:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - volume
        - muted
        - available
        - isDefault
        - isVirtual
        - backendApi
      properties:
        id:
          type: string
          description: Canonical device identifier.
        label:
          type: string
          description: Human-readable device name.
        volume:
          type: number
          description: Normalized device volume.
          minimum: 0
        muted:
          type: boolean
        available:
          type: boolean
        isDefault:
          type: boolean
        isVirtual:
          type: boolean
        backendApi:
          type:
            - string
            - 'null'
          description: Backend API reported by the device, such as `alsa`.
    AudioOutputState:
      type: object
      additionalProperties: false
      required:
        - sinks
        - selectedSinkId
      properties:
        sinks:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSinkId:
          type:
            - string
            - 'null'
          description: Identifier of the current default output sink.
    AudioInputState:
      type: object
      additionalProperties: false
      required:
        - sources
        - selectedSourceId
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSourceId:
          type:
            - string
            - 'null'
          description: Identifier of the current default input source.
    AudioState:
      type: object
      additionalProperties: false
      required:
        - sinks
        - selectedSinkId
        - sources
        - selectedSourceId
      properties:
        sinks:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSinkId:
          type:
            - string
            - 'null'
        sources:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSourceId:
          type:
            - string
            - 'null'
    VolumeValueRequest:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: number
          description: Normalized volume value. For `/volume` requests this is the target level. For `/volume/increment` and `/volume/decrement` requests this is the requested delta.
    MuteValueRequest:
      type: object
      additionalProperties: false
      required:
        - muted
      properties:
        muted:
          type: boolean
          description: Target mute state to apply.
    DefaultDeviceChangeResult:
      type: object
      additionalProperties: false
      required:
        - status
        - deviceId
      properties:
        status:
          type: string
          enum:
            - accepted
            - not_ready
            - sink_not_found
            - source_not_found
            - sink_not_writable
            - source_not_writable
        deviceId:
          type: string
    MuteChangeResult:
      type: object
      additionalProperties: false
      required:
        - status
        - deviceId
        - requestedMuted
        - targetMuted
        - previousMuted
      properties:
        status:
          type: string
          enum:
            - accepted
            - not_ready
            - sink_not_found
            - source_not_found
            - sink_not_writable
            - source_not_writable
        deviceId:
          type: string
        requestedMuted:
          type:
            - boolean
            - 'null'
        targetMuted:
          type:
            - boolean
            - 'null'
        previousMuted:
          type:
            - boolean
            - 'null'
    VolumeChangeResult:
      type: object
      additionalProperties: false
      required:
        - status
        - sinkId
        - requestedValue
        - targetValue
        - previousValue
      properties:
        status:
          type: string
          enum:
            - accepted
            - not_ready
            - sink_not_found
            - sink_not_writable
            - invalid_value
        sinkId:
          type: string
        requestedValue:
          type:
            - number
            - 'null'
        targetValue:
          type:
            - number
            - 'null'
        previousValue:
          type:
            - number
            - 'null'
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - code
        - message
      properties:
        ok:
          type: boolean
          const: false
        code:
          type: string
        message:
          type: string
