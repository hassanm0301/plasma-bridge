asyncapi: 3.1.0
info:
  title: plasma_bridge WebSocket API
  version: '@PLASMA_BRIDGE_VERSION@'
  description: Live WebSocket monitoring for KDE Plasma sinks and sources. The implemented endpoint is `@PLASMA_BRIDGE_AUDIO_WS_PATH@`, and local HTTP default, mute, and volume-control writes converge back through this stream.
defaultContentType: application/json
servers:
  local:
    host: '@PLASMA_BRIDGE_DEFAULT_WS_HOSTPORT@'
    pathname: '@PLASMA_BRIDGE_AUDIO_WS_PATH@'
    protocol: ws
    title: Local WebSocket server
    summary: WebSocket endpoint for live audio sink and source state.
channels:
  wsAudio:
    address: '@PLASMA_BRIDGE_AUDIO_WS_PATH@'
    messages:
      hello:
        $ref: '#/components/messages/Hello'
      fullState:
        $ref: '#/components/messages/FullState'
      patch:
        $ref: '#/components/messages/Patch'
      error:
        $ref: '#/components/messages/Error'
operations:
  receiveHello:
    action: receive
    channel:
      $ref: '#/channels/wsAudio'
    title: Receive hello
    summary: Accept the initial client hello message.
    description: The client must send this message before the service streams any state.
    messages:
      - $ref: '#/channels/wsAudio/messages/hello'
  sendFullState:
    action: send
    channel:
      $ref: '#/channels/wsAudio'
    title: Send full state
    summary: Send the initial audio snapshot after a successful hello.
    messages:
      - $ref: '#/channels/wsAudio/messages/fullState'
  sendPatch:
    action: send
    channel:
      $ref: '#/channels/wsAudio'
    title: Send patch
    summary: Send an audio update after sink, source, or default-device changes.
    description: Each patch replaces the full `audio` subtree. Local HTTP control writes may trigger the same patch stream after the observer republishes state.
    messages:
      - $ref: '#/channels/wsAudio/messages/patch'
  sendError:
    action: send
    channel:
      $ref: '#/channels/wsAudio'
    title: Send error
    summary: Send a protocol or readiness error to the client.
    description: Invalid JSON, unsupported protocol versions, and unsupported client messages return an `error` message and close the socket. A `not_ready` error may be sent before the initial audio state is available.
    messages:
      - $ref: '#/channels/wsAudio/messages/error'
components:
  schemas:
    NullValue:
      type: 'null'
    AudioDeviceState:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - volume
        - muted
        - available
        - isDefault
        - isVirtual
        - backendApi
      properties:
        id:
          type: string
        label:
          type: string
        volume:
          type: number
          minimum: 0
        muted:
          type: boolean
        available:
          type: boolean
        isDefault:
          type: boolean
        isVirtual:
          type: boolean
        backendApi:
          type:
            - string
            - 'null'
    AudioState:
      type: object
      additionalProperties: false
      required:
        - sinks
        - selectedSinkId
        - sources
        - selectedSourceId
      properties:
        sinks:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSinkId:
          type:
            - string
            - 'null'
        sources:
          type: array
          items:
            $ref: '#/components/schemas/AudioDeviceState'
        selectedSourceId:
          type:
            - string
            - 'null'
    AudioPayload:
      type: object
      additionalProperties: false
      required:
        - audio
      properties:
        audio:
          $ref: '#/components/schemas/AudioState'
    PatchChange:
      type: object
      additionalProperties: false
      required:
        - path
        - value
      properties:
        path:
          type: string
          const: audio
        value:
          $ref: '#/components/schemas/AudioState'
    HelloData:
      type: object
      additionalProperties: false
      required:
        - protocolVersion
      properties:
        protocolVersion:
          type: integer
          const: @PLASMA_BRIDGE_AUDIO_PROTOCOL_VERSION@
    PatchData:
      type: object
      additionalProperties: false
      required:
        - reason
        - sinkId
        - sourceId
        - changes
      properties:
        reason:
          type:
            - string
            - 'null'
        sinkId:
          type:
            - string
            - 'null'
        sourceId:
          type:
            - string
            - 'null'
        changes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PatchChange'
    ErrorObject:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type:
            - object
            - 'null'
          additionalProperties: true
    HelloMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: hello
        payload:
          $ref: '#/components/schemas/HelloData'
        error:
          $ref: '#/components/schemas/NullValue'
    FullStateMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: fullState
        payload:
          $ref: '#/components/schemas/AudioPayload'
        error:
          $ref: '#/components/schemas/NullValue'
    PatchMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: patch
        payload:
          $ref: '#/components/schemas/PatchData'
        error:
          $ref: '#/components/schemas/NullValue'
    ErrorMessage:
      type: object
      additionalProperties: false
      required:
        - type
        - payload
        - error
      properties:
        type:
          type: string
          const: error
        payload:
          $ref: '#/components/schemas/NullValue'
        error:
          $ref: '#/components/schemas/ErrorObject'
  messages:
    Hello:
      name: hello
      title: Hello
      summary: Initial client hello message.
      payload:
        $ref: '#/components/schemas/HelloMessage'
      examples:
        - payload:
            type: hello
            payload:
              protocolVersion: @PLASMA_BRIDGE_AUDIO_PROTOCOL_VERSION@
            error: null
    FullState:
      name: fullState
      title: Full state
      summary: Initial audio snapshot sent after a successful hello.
      payload:
        $ref: '#/components/schemas/FullStateMessage'
      examples:
        - payload:
            type: fullState
            payload:
              audio:
                sinks:
                  - id: sink-main
                    label: Primary Speakers
                    volume: 0.75
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
                selectedSinkId: sink-main
                sources:
                  - id: source-main
                    label: Primary Microphone
                    volume: 0.64
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
                selectedSourceId: source-main
            error: null
    Patch:
      name: patch
      title: Patch
      summary: Audio change event.
      payload:
        $ref: '#/components/schemas/PatchMessage'
      examples:
        - payload:
            type: patch
            payload:
              reason: sink-updated
              sinkId: sink-main
              sourceId: null
              changes:
                - path: audio
                  value:
                    sinks:
                      - id: sink-main
                        label: Primary Speakers
                        volume: 0.75
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSinkId: sink-main
                    sources:
                      - id: source-main
                        label: Primary Microphone
                        volume: 0.64
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSourceId: source-main
            error: null
        - payload:
            type: patch
            payload:
              reason: source-updated
              sinkId: null
              sourceId: source-main
              changes:
                - path: audio
                  value:
                    sinks:
                      - id: sink-main
                        label: Primary Speakers
                        volume: 0.75
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSinkId: sink-main
                    sources:
                      - id: source-main
                        label: Primary Microphone
                        volume: 0.70
                        muted: false
                        available: true
                        isDefault: true
                        isVirtual: false
                        backendApi: alsa
                    selectedSourceId: source-main
            error: null
    Error:
      name: error
      title: Error
      summary: Error message emitted by the service.
      payload:
        $ref: '#/components/schemas/ErrorMessage'
      examples:
        - payload:
            type: error
            payload: null
            error:
              code: not_ready
              message: Initial audio state is not ready yet.
