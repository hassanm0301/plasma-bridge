asyncapi: 3.1.0
info:
  title: plasma_bridge WebSocket API
  version: 0.1.0
  description: Live audio sink monitoring for KDE Plasma.
defaultContentType: application/json
servers:
  local:
    host: 127.0.0.1:8081
    pathname: /
    protocol: ws
    title: Local WebSocket server
    summary: WebSocket endpoint for live audio sink state.
channels:
  root:
    address: /
    messages:
      hello:
        $ref: '#/components/messages/Hello'
      fullState:
        $ref: '#/components/messages/FullState'
      patch:
        $ref: '#/components/messages/Patch'
      error:
        $ref: '#/components/messages/Error'
operations:
  receiveHello:
    action: receive
    channel:
      $ref: '#/channels/root'
    title: Receive hello
    summary: Accept the initial client hello message.
    description: The client must send this message before the service streams any state.
    messages:
      - $ref: '#/channels/root/messages/hello'
  sendFullState:
    action: send
    channel:
      $ref: '#/channels/root'
    title: Send full state
    summary: Send the initial audio snapshot after a successful hello.
    messages:
      - $ref: '#/channels/root/messages/fullState'
  sendPatch:
    action: send
    channel:
      $ref: '#/channels/root'
    title: Send patch
    summary: Send an audio update after sink or default-sink changes.
    description: Each patch replaces the full `audio` subtree.
    messages:
      - $ref: '#/channels/root/messages/patch'
  sendError:
    action: send
    channel:
      $ref: '#/channels/root'
    title: Send error
    summary: Send a protocol or readiness error to the client.
    description: Invalid JSON, unsupported protocol versions, and unsupported client messages return an `error` message and close the socket. A `not_ready` error may be sent before the initial audio state is available.
    messages:
      - $ref: '#/channels/root/messages/error'
components:
  schemas:
    AudioSinkState:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - volume
        - muted
        - available
        - isDefault
        - isVirtual
        - backendApi
      properties:
        id:
          type: string
        label:
          type: string
        volume:
          type: number
          minimum: 0
        muted:
          type: boolean
        available:
          type: boolean
        isDefault:
          type: boolean
        isVirtual:
          type: boolean
        backendApi:
          type:
            - string
            - 'null'
    AudioState:
      type: object
      additionalProperties: false
      required:
        - sinks
        - selectedSinkId
      properties:
        sinks:
          type: array
          items:
            $ref: '#/components/schemas/AudioSinkState'
        selectedSinkId:
          type:
            - string
            - 'null'
    AudioEnvelope:
      type: object
      additionalProperties: false
      required:
        - audio
      properties:
        audio:
          $ref: '#/components/schemas/AudioState'
    PatchChange:
      type: object
      additionalProperties: false
      required:
        - path
        - value
      properties:
        path:
          type: string
          const: audio
        value:
          $ref: '#/components/schemas/AudioState'
    HelloPayload:
      type: object
      additionalProperties: false
      required:
        - type
        - protocolVersion
      properties:
        type:
          type: string
          const: hello
        protocolVersion:
          type: integer
          const: 1
    FullStatePayload:
      type: object
      additionalProperties: false
      required:
        - type
        - state
      properties:
        type:
          type: string
          const: fullState
        state:
          $ref: '#/components/schemas/AudioEnvelope'
    PatchPayload:
      type: object
      additionalProperties: false
      required:
        - type
        - reason
        - sinkId
        - changes
      properties:
        type:
          type: string
          const: patch
        reason:
          type:
            - string
            - 'null'
        sinkId:
          type:
            - string
            - 'null'
        changes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PatchChange'
    ErrorPayload:
      type: object
      additionalProperties: false
      required:
        - type
        - code
        - message
      properties:
        type:
          type: string
          const: error
        code:
          type: string
        message:
          type: string
  messages:
    Hello:
      name: hello
      title: Hello
      summary: Initial client hello message.
      payload:
        $ref: '#/components/schemas/HelloPayload'
      examples:
        - payload:
            type: hello
            protocolVersion: 1
    FullState:
      name: fullState
      title: Full state
      summary: Initial audio snapshot sent after a successful hello.
      payload:
        $ref: '#/components/schemas/FullStatePayload'
      examples:
        - payload:
            type: fullState
            state:
              audio:
                sinks:
                  - id: alsa_output.usb-example.analog-stereo
                    label: USB Audio
                    volume: 0.75
                    muted: false
                    available: true
                    isDefault: true
                    isVirtual: false
                    backendApi: alsa
                selectedSinkId: alsa_output.usb-example.analog-stereo
    Patch:
      name: patch
      title: Patch
      summary: Audio change event.
      payload:
        $ref: '#/components/schemas/PatchPayload'
      examples:
        - payload:
            type: patch
            reason: sink-updated
            sinkId: alsa_output.usb-example.analog-stereo
            changes:
              - path: audio
                value:
                  sinks:
                    - id: alsa_output.usb-example.analog-stereo
                      label: USB Audio
                      volume: 0.75
                      muted: false
                      available: true
                      isDefault: true
                      isVirtual: false
                      backendApi: alsa
                  selectedSinkId: alsa_output.usb-example.analog-stereo
    Error:
      name: error
      title: Error
      summary: Error message emitted by the service.
      payload:
        $ref: '#/components/schemas/ErrorPayload'
      examples:
        - payload:
            type: error
            code: not_ready
            message: Initial audio sink state is not ready yet.
